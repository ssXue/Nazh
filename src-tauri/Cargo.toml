[package]
name = "nazh-desktop"
version = "0.1.0"
edition = "2021"
description = "Tauri desktop shell for Nazh"

[lib]
name = "nazh_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
nazh-engine = { path = ".." }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
tokio = { version = "1", features = ["sync", "time"] }
