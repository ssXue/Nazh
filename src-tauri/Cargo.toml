[package]
name = "nazh-desktop"
version = "0.1.0"
edition = "2021"
rust-version = "1.94"
description = "Tauri desktop shell for Nazh"
license = "MIT"
authors = ["Niu Zhihong"]
repository = "https://github.com/zhihongniu/Nazh"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"

[lib]
name = "nazh_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
nazh-engine = { path = ".." }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
tokio = { version = "1", features = ["sync", "time"] }
