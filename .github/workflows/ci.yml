name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  changes:
    name: Changes
    runs-on: ubuntu-latest
    outputs:
      cargo_policy: ${{ steps.filter.outputs.cargo_policy }}
      ts_bindings: ${{ steps.filter.outputs.ts_bindings }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cargo_policy:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**/Cargo.toml'
              - 'src-tauri/Cargo.toml'
              - 'src-tauri/Cargo.lock'
              - 'deny.toml'
            ts_bindings:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'src/**'
              - 'crates/**'
              - 'web/src/generated/**'
            web:
              - 'web/**'

  cargo-deny:
    name: Cargo Deny
    needs: changes
    if: needs.changes.outputs.cargo_policy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  rust-ts-export:
    name: TS Export Bindings
    needs: changes
    if: needs.changes.outputs.ts_bindings == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: 触发 ts-rs 类型导出
        run: cargo test -p tauri-bindings --features ts-export export_bindings
      - name: 校验 web/src/generated/ 与提交一致
        run: git diff --exit-code -- web/src/generated/

  web-build:
    name: Web Build
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm --prefix web ci
      - run: npm --prefix web run build
