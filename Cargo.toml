[package]
name = "nazh-engine"
version = "0.1.0"
edition = "2021"
rust-version = "1.94"
description = "Industrial edge workflow runtime prototype for Nazh"
license = "MIT"
authors = ["Niu Zhihong"]
repository = "https://github.com/zhihongniu/Nazh"
keywords = ["workflow", "edge-computing", "industrial", "dag", "orchestration"]
categories = ["asynchronous", "embedded"]

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"

[lib]
name = "nazh_engine"
path = "src/lib.rs"

[[example]]
name = "phase1_demo"
path = "examples/phase1_demo.rs"

[dependencies]
async-trait = "0.1"
chrono = { version = "0.4", features = ["clock", "serde"] }
futures-util = "0.3"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
rhai = { version = "1", features = ["serde", "sync"] }
rusqlite = { version = "0.33", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time"] }
ts-rs = { version = "10", features = ["serde-compat", "serde-json-impl", "chrono-impl", "uuid-impl"] }
uuid = { version = "1", features = ["serde", "v4"] }

[profile.release]
lto = true
codegen-units = 1
strip = true
