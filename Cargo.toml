[package]
name = "nazh-engine"
version = "0.1.0"
edition = "2021"
description = "Industrial edge workflow runtime prototype for Nazh"
license = "MIT"

[lib]
name = "nazh_engine"
path = "src/lib.rs"

[[example]]
name = "phase1_demo"
path = "examples/phase1_demo.rs"

[dependencies]
async-trait = "0.1"
chrono = { version = "0.4", features = ["clock", "serde"] }
futures-util = "0.3"
rhai = { version = "1", features = ["serde", "sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time"] }
uuid = { version = "1", features = ["serde", "v4"] }
